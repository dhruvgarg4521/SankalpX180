name: sankalpx180
description: A sobriety and dopamine-reset app for Indian users focused on porn addiction recovery.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  uuid: ^4.2.1
  
  # Audio
  audioplayers: ^5.2.1
  
  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # HTTP (for future API integration)
  http: ^1.1.2
  
  # Date & Time
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/icons/
